name: Daily Post Generator

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate new post (Claude Opus 4.8, Gemini fallback)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TEXT_PROVIDER: ${{ vars.TEXT_PROVIDER }}
        run: python generate_post.py

      - name: Commit new post to posts.json
        run: |
          git config user.name "LinkedIn Bot"
          git config user.email "bot@github.com"
          git add posts.json
          git diff --staged --quiet || git commit -m "chore: add daily generated post [skip ci]"
          git push
